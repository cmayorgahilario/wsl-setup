# Versiones fijas de la suite.
# Editar aquí para actualizar cualquier herramienta.
# Formato: VAR="valor"   (sin espacios alrededor del =)

# --- Rust ---
RUST_TOOLCHAIN="1.83.0"

# --- uv (Python package/project manager) ---
# Versión fija (release de astral-sh/uv). Ver: https://github.com/astral-sh/uv/releases
UV_VERSION="0.5.11"
# Python default instalado por uv
UV_PYTHON_VERSION="3.12"

# --- GitHub CLI ---
# Instalado desde repo oficial (siempre latest)
GH_FROM_APT="1"

# --- mkcert (local HTTPS certs) ---
MKCERT_VERSION="1.4.4"

# --- gum (Charm CLI para shell scripts interactivos) ---
GUM_VERSION="0.14.5"

# --- SQLite (desde apt, usa la versión del repo de Ubuntu) ---
# Si quieres versión específica, cámbialo por algo como "3.46.1-*"
SQLITE_APT_VERSION=""

# --- git-cliff (changelog generator) ---
GIT_CLIFF_VERSION="2.7.0"

# --- SDKMAN + Java (Temurin LTS) ---
# Ver versiones disponibles: sdk list java | grep tem
# Sufijo -tem = Eclipse Temurin. Cambia a la LTS que uses (21, 25, etc.)
JAVA_VERSION="21.0.5-tem"

# --- Claude Code (instalador oficial) ---
CLAUDE_CODE_INSTALLER="https://claude.ai/install.sh"

# --- GitKraken (siempre la última "active" según GitKraken) ---
GITKRAKEN_URL="https://api.gitkraken.com/releases/production/linux/x64/active/gitkraken-amd64.deb"

# --- Pencil (AppImage, se extrae) ---
PENCIL_URL="https://www.pencil.dev/download/Pencil-linux-x86_64.AppImage"

# --- Oh My Posh ---
# Instalador oficial siempre descarga última versión
OHMYPOSH_INSTALLER="https://ohmyposh.dev/install.sh"
OHMYPOSH_THEME="iterm2"

# --- NVM + Node ---
NVM_VERSION="0.40.1"
# NODE_VERSION vacío = instala la LTS más reciente
NODE_VERSION="lts"

# --- Bun ---
BUN_VERSION="1.1.42"

# --- pnpm ---
PNPM_VERSION="9.15.0"

# --- (Futuros módulos) ---
# PHP_VERSION="8.3"
# COMPOSER_VERSION="2.8.3"
